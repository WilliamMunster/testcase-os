# testcase-os configuration
# Replace placeholder values with your project-specific settings.

project:
  name: "Example Project"
  key: "EXAMPLE"

jira:
  base_url: "https://jira.example.com"
  project_key: "EXAMPLE"
  token_env: "JIRA_API_TOKEN"

confluence:
  base_url: "https://jira.example.com/confluence"
  space_key: "QA"
  # 环境变量名，与 Jira 分开配置
  token_env: "CONFLUENCE_API_TOKEN"

review:
  # P0/P1 should still be reviewed manually.
  auto_approve_p2_p3: false
  trusted_authors:
    - "qa-lead@example.com"
  ai_review_dimensions:
    - completeness
    - correctness
    - traceability
    - knowledge_consistency
    - risk_assessment
    - compliance

id_format:
  prefix: "TC"
  separator: "-"

import:
  default_source: "untracked"
  default_review: "pending"
  sanitize_on_import: true

obsidian:
  enabled: true
  vault_path: "."
